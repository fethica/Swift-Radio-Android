name: Release

# Pushing a tag like v1.0.1 builds a signed release APK and attaches it
# to a GitHub release. Requires four repository secrets
# (Settings > Secrets and variables > Actions):
#
#   KEYSTORE_BASE64    base64 of the release keystore: base64 -i release.jks
#   KEYSTORE_PASSWORD  keystore password
#   KEY_ALIAS          key alias inside the keystore
#   KEY_PASSWORD       key password (same as KEYSTORE_PASSWORD for PKCS12 keystores)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # Tags must be vMAJOR.MINOR.PATCH. versionCode packs the tag into a
      # monotonically increasing integer: v1.0.1 -> 10001, v1.2.0 -> 10200.
      - name: Derive version from tag
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + ${PATCH:-0}))
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub release with APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk "swift-radio-$GITHUB_REF_NAME.apk"
          gh release create "$GITHUB_REF_NAME" "swift-radio-$GITHUB_REF_NAME.apk" \
            --title "Swift Radio Android $GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
